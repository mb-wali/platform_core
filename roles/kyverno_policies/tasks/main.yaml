---
- name: Ensure Kyverno values directory exists
  ansible.builtin.file:
    path: /tmp/kyverno
    state: directory
    mode: "0755"

- name: Render Kyverno values file
  ansible.builtin.template:
    src: kyverno.yaml.j2
    dest: /tmp/kyverno/kyverno.yaml
    mode: "0644"

- name: Render Kyverno policies values file
  ansible.builtin.template:
    src: kyverno-policies.yaml.j2
    dest: /tmp/kyverno/kyverno_policies.yaml
    mode: "0644"

- name: Add kyverno Helm repo
  kubernetes.core.helm_repository:
    name: kyverno
    repo_url: https://kyverno.github.io/kyverno/

- name: Install or upgrade Kyverno
  kubernetes.core.helm:
    name: kyverno
    chart_ref: kyverno/kyverno
    chart_version: "{{ kyverno_helm_version }}"
    release_namespace: kyverno
    create_namespace: true
    values_files:
      - /tmp/kyverno/kyverno.yaml
    state: present

- name: Wait for Kyverno pods to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: kyverno
    label_selectors:
      - app.kubernetes.io/part-of=kyverno
  register: kyverno_pods
  retries: 30
  delay: 10
  until: >
    kyverno_pods.resources | length > 0 and
    (
      kyverno_pods.resources
      | rejectattr('status.phase', 'equalto', 'Succeeded')
      | selectattr('status.phase', 'equalto', 'Running')
      | list
      | length
    ) ==
    (
      kyverno_pods.resources
      | rejectattr('status.phase', 'equalto', 'Succeeded')
      | list
      | length
    )

## Kyverno policies
- name: Install or upgrade Kyverno policies
  kubernetes.core.helm:
    name: Kyverno-policies
    chart_ref: kyverno/kyverno-policies
    chart_version: "{{ kyverno_policies_helm_version }}"
    release_namespace: kyverno
    create_namespace: true
    values_files:
      - /tmp/kyverno/kyverno_policies.yaml
    state: present
