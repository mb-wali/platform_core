---
- name: Ensure Cilium values directory exists
  ansible.builtin.file:
    path: /tmp/cilium
    state: directory
    mode: "0755"

- name: Render Cilium values file
  ansible.builtin.template:
    src: values.yaml.j2
    dest: /tmp/cilium/values.yaml
    mode: "0644"

- name: Add Cilium Helm repo
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/

- name: Install or upgrade Cilium
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_helm_version }}"
    release_namespace: kube-system
    create_namespace: true
    values_files:
      - /tmp/cilium/values.yaml
    state: present

- name: Wait for Cilium pods to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: kube-system
    label_selectors:
      - k8s-app=cilium
  register: cilium_pods
  retries: 30
  delay: 10
  until: >
    (cilium_pods.resources | length) > 0 and
    (
      cilium_pods.resources
      | selectattr('status.phase', 'equalto', 'Running')
      | list
      | length
    ) == (cilium_pods.resources | length)